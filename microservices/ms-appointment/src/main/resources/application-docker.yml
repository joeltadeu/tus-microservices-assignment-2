      zipkin:
        endpoint: http://zipkin:9411/api/v2/spans

# Direct HTTP URLs used as fallback; primary routing goes via Eureka/Feign lb://
client:
  doctor:
    url: http://doctor-service:8082
  patient:
    url: http://patient-service:8081
