spring:
  config:
    import: "optional:configserver:http://config-server:8888"
  datasource:
    url: jdbc:mariadb://pms-mariadb:3306/pms-appointment?useSSL=false&useTimezone=true&serverTimezone=UTC
    username: root
    password: root

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka

