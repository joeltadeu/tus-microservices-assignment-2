global:
  scrape_interval:     15s
  evaluation_interval: 5s
  scrape_timeout:      10s
  external_labels:
    monitor: 'pms-monitor'

scrape_configs:

  - job_name: 'gateway'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['gateway:9094']

  - job_name: 'auth'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['auth:8084']

  - job_name: 'patient'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['patient:8081']

  - job_name: 'doctor'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['doctor:8082']

  - job_name: 'appointment'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['appointment:8083']

  - job_name: 'discovery'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['discovery:8761']
