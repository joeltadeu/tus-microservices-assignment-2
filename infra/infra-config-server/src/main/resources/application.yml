spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          # ── Replace with your actual Git repository URL ──────────────────────
          # Examples:
          #   GitHub (HTTPS):  https://github.com/your-org/pms-config-repo.git
          #   GitHub (SSH):    git@github.com:your-org/pms-config-repo.git
          #   Local (dev):     file://${user.home}/pms-config-repo
          uri: ${CONFIG_GIT_URI:file://${user.home}/pms-config-repo}

          # Branch to read configuration from (default: main)
          default-label: ${CONFIG_GIT_BRANCH:main}

          # Root search path inside the repository
          # The server will look in: {search-paths}/{application}/{application}-{profile}.yml
          search-paths: '{application}'

          # Clone the repo on startup to validate the URI is reachable
          clone-on-start: true

          # ── Authentication (uncomment if using a private repository) ────────
          # username: ${CONFIG_GIT_USERNAME}
          # password: ${CONFIG_GIT_PASSWORD}
          #
          # ── SSH key (alternative for private repos) ─────────────────────────
          # private-key: ${CONFIG_GIT_PRIVATE_KEY}
          # strict-host-key-checking: false

server:
  port: 8888

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,refresh,busrefresh
  endpoint:
    health:
      show-details: always
    metrics:
      access: read_only
    prometheus:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: true
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans

info:
  app:
    name: config-server
    description: PMS Centralised Configuration Server
    version: 1.0.0
