spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

server:
  port: 9094

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: WARN
    root: info

management:
  endpoint:
    health:
      show-details: always
    metrics:
      access: read_only
    prometheus:
      access: read_only
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: true
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans

info:
  app:
    name: api-gateway
    description: API Gateway Service
    version: 1.0.0

pms:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-secure-512-bit-secret-in-production}